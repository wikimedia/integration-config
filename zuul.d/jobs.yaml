- job:
    parent: null
    name: base
    abstract: true
    description: |-
      The recommended base job.

      All jobs ultimately inherit from this.  It runs a pre-playbook
      which copies all of the job's prepared git repos on to all of
      the nodes in the nodeset.

      It also sets a default timeout value (which may be overidden).

    secrets:
      - name: wmcs_cloud_config
        secret: wmcs_cloud_config

    pre-run: playbooks/base/pre.yaml
    post-run:
      - playbooks/base/post-logs.yaml
    roles:
      - zuul: integration/zuul-jobs
    timeout: 1800

- job:
    parent: null
    name: base-localhost
    abstract: true
    description: |-
      A base job to be used with localhost-only jobs.

    secrets:
      - name: wmcs_cloud_config
        secret: wmcs_cloud_config

    pre-run: playbooks/base-localhost/pre.yaml
    post-run:
      - playbooks/base-localhost/post-logs.yaml
    roles:
      - zuul: integration/zuul-jobs
    timeout: 1800

- job:
    name: echo
    parent: base
    description: |-
      Echo a message.

      Used for very basic testing of pipeline and project configurations.
    run: playbooks/echo/run.yaml
    vars:
      message: "hello world"

- job:
    parent: null
    name: directory-listing
    description: |-
      List the contents of the working directory.

      Used for very basic testing.
    nodeset: namespace
    run: playbooks/run/run.yaml
    vars:
      command: "ls -lR ."

- job:
    parent: base-localhost
    name: hello-world-container
    description: |-
      Runs a hello world container as a test.

      Used for very basic testing.
    nodeset: namespace
    run: playbooks/run-container/run.yaml
    vars:
      container:
        image: docker-registry.wikimedia.org/wmfdebug:0.0.7-20260614
        command: "echo hello world"
