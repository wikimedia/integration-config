---
- flavor:
    name: basic

- image:
    name: nada
    type: cloud

- image:
    name: &trixie docker-registry.wikimedia.org/trixie:20260503
    type: cloud

- image:
    name: &python-all docker-registry.wikimedia.org/releng/python-all:0.5
    type: cloud

- image:
    name: &quibble-php83 docker-registry.wikimedia.org/releng/quibble-bullseye-php83:1.17.1-s5
    type: cloud

- label:
    name: namespace
    flavor: basic
    image: nada

- label:
    name: trixie
    flavor: basic
    image: *trixie

- label:
    name: python-all
    flavor: basic
    image: *python-all

- label:
    name: quibble-php83
    flavor: basic
    image: *quibble-php83

- section:
    name: wmcs
    connection: zuul.eqiad1.wikimedia.cloud
    flavors:
      - basic
    images:
      - nada
      - *trixie
      - *python-all
      - *quibble-php83

- provider:
    name: untrusted
    section: wmcs
    labels:
      - kind: namespace
        name: namespace
        spec:
          containers:
            - &spec-default
              name: zuul
              image: *trixie
              command: ["/bin/sh", "-c"]
              args: ["sleep infinity"]

      - kind: pod
        name: trixie
        spec:
          containers:
            - *spec-default

      - kind: pod
        name: python-all
        spec:
          containers:
            - <<: *spec-default
              image: *python-all

      - kind: pod
        name: quibble-php83
        spec:
          containers:
            - <<: *spec-default
              image: *quibble-php83
