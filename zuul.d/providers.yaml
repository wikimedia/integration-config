- flavor:
    name: basic

- image:
    name: nada
    type: cloud

- image:
    name: &trixie docker-registry.wikimedia.org/trixie:20260503
    type: cloud

- image:
    name: &quibble-php83 docker-registry.wikimedia.org/releng/quibble-bullseye-php83:1.17.1-s5
    type: cloud

- label:
    name: namespace
    flavor: basic
    image: nada

- label:
    name: trixie
    flavor: basic
    image: *trixie

- label:
    name: quibble-php83
    flavor: basic
    image: *quibble-php83

- section:
    name: wmcs
    connection: zuul.eqiad1.wikimedia.cloud
    flavors:
      - basic
    images:
      - nada
      - *trixie
      - *quibble-php83

- provider:
    name: untrusted
    section: wmcs
    labels:
      - kind: namespace
        name: namespace
        spec:
          containers:
            - name: zuul
              image: *trixie

      - kind: pod
        name: trixie
        spec:
          containers:
            - name: zuul
              image: *trixie

      - kind: pod
        name: quibble-php83
        spec:
          containers:
            - name: zuul
              image: *quibble-php83
