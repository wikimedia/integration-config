# Credentials used for upload-logs-swift role:
# https://zuul-ci.org/docs/zuul-jobs/latest/log-roles.html#role-upload-logs-swift
# https://wikitech.wikimedia.org/wiki/Help:Object_storage_user_guide#Swift_API
#
# Create them at https://horizon.wikimedia.org/identity/application_credentials/
#
# Name: zuul-swift-upload
# Description: Credential to upload artifacts to Swift
# Roles: member
# Access Rules:
#   [
#     {
#       "service": "object-store",
#       "method": "PUT",
#       "path": "/v1/AUTH_*/artifacts/*"
#     },
#     {
#       "service": "object-store",
#       "method": "HEAD",
#       "path": "/v1/AUTH_*/artifacts/*"
#     },
#     {
#       "service": "object-store",
#       "method": "HEAD",
#       "path": "/v1/AUTH_*/artifacts"
#     }
#   ]
#
# Download the resulting `clouds.yaml` then individually encrypt the values of
# `application_credential_id` and `application_credential_secret` using:
#
#   zuul-client --zuul-url https://zuul.wikimedia.org/ \
#       encrypt --tenant wikimedia --project integration/config
#
# Then report each encypted values below.
#
