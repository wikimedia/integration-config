---
- publisher:
    name: archive-tox-logs
    publishers:
     - archive:
         artifacts: '**/.tox/*/log/*.log,**/.tox/log/*'

- job-template: &job_tox
    name: 'tox'
    node: Docker
    docker_image_var: docker-registry.wikimedia.org/releng/tox-v3:0.5
    triggers:
        - zuul
    builders:
        - docker-castor-load
        - docker-log-dir
        - docker-src-dir
        - docker-run-with-log-cache-src:
            image: '{obj:docker_image_var}'
    wrappers:
      - timeout:
          timeout: '{obj:build_timeout|20}'  # minutes
      - timestamps
    publishers:
        - archive-log-dir
        - teardown

- job-template:
    !!merge : *job_tox
    name: '{name}-tox'
    triggers:
        - zuul

- job-template:
    !!merge : *job_tox
    name: '{name}-tox-{toxenv}'
    triggers:
        - zuul
    builders:
        - docker-castor-load
        - docker-log-dir
        - docker-src-dir
        - docker-run-with-log-cache-src:
            image: '{obj:docker_image_var}'
            args: '-e "{toxenv}"'

# Call tox env 'docvenv' (default: 'doc' to generate documentation in labs and
# publish to doc.wikimedia.org using an intermediate rsync repository in labs.
# Intended for changes being merged, eg in 'postmerge'
- job-template:
    name: '{name}-tox-publish'
    node: Docker
    concurrent: false
    docker_image_var: docker-registry.wikimedia.org/releng/tox-v3:0.5
    triggers:
     - zuul
    builders:
     - docker-castor-load
     - docker-log-dir
     - docker-src-dir
     - docker-run-with-log-cache-src:
         image: '{obj:docker_image_var}'
         args: '-e "{obj:docenv|doc}"'
     - doc-publish:
        docsrc: 'src/{docsrc}'
        docdest: '{docdest}'
    publishers:
     - archive-log-dir
     - teardown

- job-template:
    name: '{name}-tox-coverage-publish'
    node: Docker
    concurrent: false
    docker_image_var: docker-registry.wikimedia.org/releng/tox-v3:0.5
    triggers:
      - zuul
    builders:
      - docker-castor-load
      - docker-log-dir
      - docker-src-dir
      - docker-run-with-log-cache-src:
          image: '{obj:docker_image_var}'
          args: '-e "{obj:coverenv|cover}"'
      - cover-publish:
          src: 'src/{obj:coversrc|htmlcov}'
          dest: '{coverdest}'
    publishers:
      - archive-log-dir
      - teardown

# Same but for ref-update, eg in 'publish'
- job-template:
    name: '{name}-tox-tag-publish'
    node: Docker
    concurrent: false
    docker_image_var: docker-registry.wikimedia.org/releng/tox-v3:0.5
    triggers:
     - zuul-post
    builders:
    # No cache restore/save (castor) for tags
     - docker-log-dir
     - docker-src-dir
     - docker-run-with-log-cache-src:
         image: '{obj:docker_image_var}'
         args: '-e "{obj:docenv|doc}"'
     - doc-publish:
        docsrc: 'src/{docsrc}'
        docdest: '{docdest}'
    publishers:
     - archive-log-dir
     - docker-cleanup

# Publish jobs for merged changes and tags
- job-group:
    name: 'tox-publish-jobs'
    jobs:
        - '{name}-tox-publish'
        - '{name}-tox-tag-publish'

- job:
    name: 'tox-py311-coverage-publish'
    node: Docker
    concurrent: false
    triggers:
        - zuul
    builders:
     - docker-castor-load
     - docker-log-dir
     - docker-src-dir
     - docker-run-with-log-cache-src:
         image: docker-registry.wikimedia.org/releng/tox-v3:0.5
         args: '-e coverage'
     - cover-publish:
        src: 'src/coverage'
        dest: '$DOC_PROJECT'
    publishers:
        - archive-log-dir
        - teardown

- project:
    name: common-tox-jobs
    jobs:
     - tox

- job:
    name: 'commit-message-validator'
    node: Docker
    triggers:
     - zuul
    builders:
     - docker-src-dir
     - docker-ci-src-setup-simple
     - docker-run:
        volumes:
            src:
        image: docker-registry.wikimedia.org/releng/commit-message-validator:2.3.0
    publishers:
     - docker-cleanup
