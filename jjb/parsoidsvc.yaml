- job:
    name: 'parsoidsvc-doxygen-publish'
    node: Docker
    concurrent: false
    triggers:
     - zuul
    builders:
     - docker-log-dir
     - docker-src-dir
     - docker-run-with-log-cache-src:
         image: docker-registry.wikimedia.org/releng/doxygen:1.10-0.s3
     - doc-publish:
        docsrc: 'src/doc/html'
        docdest: 'Parsoid-PHP/$DOC_SUBPATH'
    publishers:
     - archive-log-allow-empty
     - docker-cleanup

- project:
    name: parsoidsvc
    jobs:
        - '{name}-composer-package-{phpflavor}':
            phpflavor:
                - php82:
                    image: docker-registry.wikimedia.org/releng/composer-php82:8.2.30-s2
                - php83:
                    image: docker-registry.wikimedia.org/releng/composer-php83:8.3.30-s2
                - php84:
                    image: docker-registry.wikimedia.org/releng/composer-php84:8.4.18-s2
                - php85:
                    image: docker-registry.wikimedia.org/releng/composer-php85:8.5.3-s2
