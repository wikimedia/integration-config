- project:
    name: search
    project:
        - extra
        - highlighter
        - extra-analysis
    release-branch: master
    publishers:
        - email-wikimedia-discovery
        - docker-cleanup
    jobs:
        - '{name}-{project}-maven-java11'
        - '{name}-{project}-maven-java17'
        - '{name}-{project}-maven-java17-site-publish'

# Note: As Glent runs differently from the above, we've split the builds
- project:
    name: search-glent
    release-branch: master
    publishers:
        - email-wikimedia-discovery
        - docker-cleanup
    jobs:
        - '{name}-maven-java8'
        - '{name}-maven-java11'
        - '{name}-maven-java8-site-publish'

- project:
    name: wmf-jvm-utils
    release-project: wmf-jvm-utils
    release-branch: master
    publishers:
        - email-wikimedia-discovery
        - teardown
    jobs:
        - '{name}-maven-java8'
        - '{name}-maven-java11'
        - '{name}-maven-java8-site-publish'
        - '{name}-maven-release'
