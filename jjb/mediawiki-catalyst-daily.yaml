- job-template:
    name: catalyst-daily-{extension}
    node: Docker
    triggers:
        - timed: '{trigger-time}'
    parameters:
        - string:
            name: 'ZUUL_URL'
            default: 'https://gerrit.wikimedia.org/r/p'
        - string:
            name: 'ZUUL_PROJECT'
            default: '{repo}'
        - string:
            name: 'ZUUL_REF'
            default: 'master'
        - string:
            name: 'ZUUL_PIPELINE'
            default: 'daily'
    builders:
        - setup
        - docker-pull-and-report-image:
              image: docker-registry.wikimedia.org/repos/test-platform/catalyst/catalyst-ci-client:latest
        - docker-run-with-log-cache-src:
              image: docker-registry.wikimedia.org/repos/test-platform/catalyst/catalyst-ci-client:latest
              entrypoint: '/srv/app/deploy_env.py'
              environment:
                  PROJECT_SLUG: '{project-slug}'
                  CI_JOB_ID: 'daily'
                  CHART_NAME: 'mediawiki'
                  JSON_VALUES: '{json-values}'
                  ENV_API_PATH: 'https://api.catalyst.wmcloud.org/api/environments'
                  EXPIRY_TIME_HOURS: '1'
                  LOG_DIR: '/log'
        - docker-run-with-log-cache-src:
              image: docker-registry.wikimedia.org/releng/node24-test-browser:24.14.1-s1
              environment:
                  MEDIAWIKI_USER: 'Admin'
                  MEDIAWIKI_PASSWORD: 'dockerpass'
                  MW_SCRIPT_PATH: '/w'
                  FORCE_COLOR: '1'
              entrypoint: '/bin/bash'
              args: '-c "cp /log/deploy.env .env && /run-with-xvfb.sh selenium-test"'
    wrappers:
        - timeout:
            timeout: 30
            fail: true
        - credentials-binding:
            - text:
                credential-id: mwext-catalyst-daily-api-key
                variable: CATALYST_API_TOKEN
    publishers:
        - archive-log-allow-empty
        - postbuildscript:
            builders:
                - build-on:
                    - SUCCESS
                    - FAILURE
                    - UNSTABLE
                    - ABORTED
                  build-steps:
                    - shell: |
                        eval "$(cat log/deploy.env)"
                        curl -X "DELETE" "https://api.catalyst.wmcloud.org/api/environments/${{ENV_ID}}" \
                          -H "Authorization: ApiToken ${{CATALYST_API_TOKEN}}"
        - teardown
        # Temporarily, e-mail Vaughn on failures
        - email-ext:
            recipients:   vwalters@wikimedia.org
            content-type: text
            subject:      Broken build $BUILD_TAG
            body:         |
                          The build $BUILD_NUMBER for catalyst-daily-{extension} has failed.
                          See $BUILD_URL for details.
            failure:      true
            unstable:     true

- project:
    name: catalyst-daily
    # json-values sets an ingress without the env id to match deploy_env.py
    extension:
        - VisualEditor:
            trigger-time: '0 8 * * *'
            repo: 'mediawiki/extensions/VisualEditor'
            project-slug: 'mw-ext-ve'
            json-values: '{{ "mediawikiCore": {{ "ingress": "mw-ext-ve-ci-daily.catalyst.wmcloud.org" }}, "extensions": [ {{ "name": "VisualEditor", "enable": true, "branch": "master" }} ], "skins": [ {{ "name": "Vector", "enable": true, "branch": "master" }} ], "otherModules": [ {{ "name": "parsoid", "enable": true, "branch": "master" }} ] }}'
        - CampaignEvents:
            trigger-time: '5 8 * * *'
            repo: 'mediawiki/extensions/CampaignEvents'
            project-slug: 'mw-ext-ce'
            json-values: '{{ "mediawikiCore": {{ "ingress": "mw-ext-ce-ci-daily.catalyst.wmcloud.org" }}, "extensions": [ {{ "name": "CampaignEvents", "enable": true, "branch": "master" }}, {{ "name": "cldr", "enable": true, "branch": "master" }} ], "skins": [ {{ "name": "Vector", "enable": true, "branch": "master" }} ] }}'
        - TwoColConflict:
            trigger-time: '10 8 * * *'
            repo: 'mediawiki/extensions/TwoColConflict'
            project-slug: 'mw-ext-tcc'
            json-values: '{{ "mediawikiCore": {{ "ingress": "mw-ext-tcc-ci-daily.catalyst.wmcloud.org" }}, "extensions": [ {{ "name": "TwoColConflict", "enable": true, "branch": "master" }}, {{ "name": "BetaFeatures", "enable": true, "branch": "master" }} ], "skins": [ {{ "name": "Vector", "enable": true, "branch": "master" }} ] }}'
        - Echo:
            trigger-time: '15 8 * * *'
            repo: 'mediawiki/extensions/Echo'
            project-slug: 'mw-ext-echo'
            json-values: '{{ "mediawikiCore": {{ "ingress": "mw-ext-echo-ci-daily.catalyst.wmcloud.org" }}, "extensions": [ {{ "name": "Echo", "enable": true, "branch": "master" }} ], "skins": [ {{ "name": "Vector", "enable": true, "branch": "master" }} ] }}'
        - AdvancedSearch:
            trigger-time: '20 8 * * *'
            repo: 'mediawiki/extensions/AdvancedSearch'
            project-slug: 'mw-ext-as'
            json-values: '{{ "mediawikiCore": {{ "ingress": "mw-ext-as-ci-daily.catalyst.wmcloud.org" }}, "extensions": [ {{ "name": "AdvancedSearch", "enable": true, "branch": "master" }} ], "skins": [ {{ "name": "Vector", "enable": true, "branch": "master" }} ] }}'
        - Popups:
            trigger-time: '25 8 * * *'
            repo: 'mediawiki/extensions/Popups'
            project-slug: 'mw-ext-popups'
            json-values: '{{ "mediawikiCore": {{ "ingress": "mw-ext-popups-ci-daily.catalyst.wmcloud.org" }}, "extensions": [ {{ "name": "Popups", "enable": true, "branch": "master" }}, {{ "name": "TextExtracts", "enable": true, "branch": "master" }}, {{ "name": "PageImages", "enable": true, "branch": "master" }} ], "skins": [ {{ "name": "Vector", "enable": true, "branch": "master" }} ] }}'
    jobs:
        - 'catalyst-daily-{extension}'
